<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tommy John Surgery Questionnaire</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; background: white; border-radius: 5px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        h1 { text-align: center; }
        label { display: block; margin: 10px 0 5px; }
        input[type="text"], input[type="number"], input[type="email"], textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="submit"] { background-color: #007bff; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dominican Republic Baseball Tommy John Surgery Questionnaire</h1>
        <form id="surgeryQuestionnaire">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required />

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required />

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />

            <label for="surgeryDate">Date of Surgery:</label>
            <input type="date" id="surgeryDate" name="surgeryDate" required />

            <label for="details">Details of your condition:</label>
            <textarea id="details" name="details" rows="4" required></textarea>

            <input type="submit" value="Submit" />
        </form>
    </div>
    <script>
        document.getElementById('surgeryQuestionnaire').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent form submission
            alert('Thank you for your submission!'); // Display thank you message
            // Here you can add code to handle form data or send it to a server
        });
    </script>
</body>
</html>
